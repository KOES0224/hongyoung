  <!-- Secret Admin Lock -->
  <div id="admin-lock" style="position:fixed; bottom:20px; right:20px; width:45px; height:45px; background:var(--bg-secondary); border-radius:50%; display:flex; justify-content:center; align-items:center; cursor:pointer; box-shadow:0 10px 20px rgba(0,0,0,0.1); opacity:0.3; transition:opacity 0.3s; z-index:9999;" onclick="promptAdminLogin()">
    🔒
  </div>
  <script>
    async function promptAdminLogin() {
        if(localStorage.getItem("hy_token")) {
            window.location.href = "admin.html";
            return;
        }
        const pw = prompt("관리자 비밀번호를 입력하세요:");
        if(pw === "ghddud1") {
            try {
                const res = await fetch("http://localhost:3000/api/login", {
                    method: "POST", headers:{"Content-Type":"application/json"},
                    body: JSON.stringify({id:"hycatch", pw:"ghddud1"})
                });
                const data = await res.json();
                if(data.success) {
                    localStorage.setItem("hy_token", data.token);
                    alert("로컬 파이썬 서버 연결 확인됨! 어드민 패널로 이동합니다.");
                    window.location.href = "admin.html";
                }
            } catch(err) {
                localStorage.setItem("hy_token", "static-auth");
                alert("인증 완료 (현재 로컬 파이썬 서버가 꺼져 있어 엑셀/저장 버튼은 비활성화됩니다).");
                window.location.href = "admin.html";
            }
        } else if(pw) {
            alert("비밀번호가 틀렸습니다.");
        }
    }
  </script>

</body>
