</head>
<body>
  
  <nav>
    <div class="nav-container">
      <a href="index.html" class="logo">Hongyoung</a>
      <ul class="nav-links">
        <li><a href="machines.html">Mac & Machines</a></li>
        <li><a href="materials.html">Materials</a></li>
        <li style="margin-left: 20px;"><a href="#" onclick="promptAdminLogin()" style="font-size:12px; color:var(--text-sc); opacity:0.6;">Staff Login</a></li>
      </ul>
    </div>
  </nav>

  <div class="hero-section" style="margin-bottom:20px;">
    <h1 class="hero-title">Industrial Masterpiece.</h1>
    <h2 class="hero-subtitle">완벽하게 제어되는 포장의 예술.</h2>
  </div>
  <div style="text-align:center; padding-bottom:100px;">
      <a href="machines.html"><img src="assets/real_images/machines/bander_auto.jpg" style="height:400px; border-radius:30px; margin-right:20px;"></a>
      <a href="materials.html"><img src="assets/real_images/ppband.jpg" style="height:400px; border-radius:30px;"></a>
  </div>

  
  <script>
    async function promptAdminLogin() {
        if(localStorage.getItem("hy_token")) {
            window.location.href = "admin.html";
            return;
        }
        const pw = prompt("관리자 비밀번호를 입력하세요:");
        if(pw === "ghddud1") {
            try {
                const res = await fetch("http://localhost:3000/api/login", {
                    method: "POST", headers:{"Content-Type":"application/json"},
                    body: JSON.stringify({id:"hycatch", pw:"ghddud1"})
                });
                const data = await res.json();
                if(data.success) {
                    localStorage.setItem("hy_token", data.token);
                    alert("로컬 파이썬 서버 연결 확인됨! 어드민 패널로 이동합니다.");
                    window.location.href = "admin.html";
                }
            } catch(err) {
                localStorage.setItem("hy_token", "static-auth");
                alert("인증 완료 (현재 로컬 파이썬 서버가 꺼져 있어 엑셀/저장 버튼은 비활성화됩니다).");
                window.location.href = "admin.html";
            }
        } else if(pw) {
            alert("비밀번호가 틀렸습니다.");
        }
    }
  </script>

</body>
</html>
