<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>통합 재고/관리 어드민</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .admin-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:99999; display:flex; justify-content:center; align-items:center; }
    .login-box { background:var(--bg-secondary); padding:50px; border-radius:30px; text-align:center; box-shadow:0 30px 60px rgba(0,0,0,0.1); width: 400px;}
    .login-input { display:block; width:100%; padding:15px; margin-bottom:15px; border-radius:12px; border:1px solid var(--border); font-size:16px; background:var(--bg); color:var(--text); }
    .hidden { display: none !important; }
    .tab-bar { display:flex; gap:20px; margin-bottom:30px; border-bottom:1px solid var(--border); padding-bottom:15px; }
    .tab-btn { background:none; border:none; font-size:18px; color:var(--text-sc); cursor:pointer; padding-bottom:5px; transition:color 0.3s; }
    .tab-btn.active { color:var(--text); font-weight:600; border-bottom:2px solid var(--text); }
    .form-group { margin-bottom:20px; }
    .form-group label { display:block; margin-bottom:8px; font-size:14px; color:var(--text-sc); }
    .form-control { width:100%; padding:12px; border-radius:12px; border:1px solid var(--border); background:var(--bg-secondary); color:var(--text); font-family:inherit; }
    
    .status-bar { text-align:right; margin-top:-20px; margin-bottom:20px; font-size:14px; }
    .dot { display:inline-block; width:10px; height:10px; border-radius:50%; background:gray; margin-right:5px; }
    .dot.on { background:#34c759; }
    .dot.off { background:#ff3b30; }
  </style>
</head>
<body>
  <div class="admin-overlay" id="login-overlay">
      <div class="login-box">
          <h2 style="font-size:24px; margin-bottom:30px; letter-spacing:-0.03em;">Hongyoung Admin</h2>
          <input type="text" id="login-id" class="login-input" placeholder="Admin ID" />
          <input type="password" id="login-pw" class="login-input" placeholder="Password" />
          <button class="btn-primary" style="width:100%; font-size:16px; padding:15px;" onclick="doLogin()">로그인</button>
      </div>
  </div>

  <nav>
    <div class="nav-container" style="max-width:1000px;">
      <a href="index.html" class="logo">홍영컴퍼니 Admin</a>
      <div>
         <button class="btn-primary" onclick="deployToVercel()" id="deploy-btn" style="background:#bf4800; margin-right:10px;">🚀 실서버 배포 쏴주기(Vercel 연동)</button>
         <button class="btn-primary" onclick="doLogout()" style="padding:6px 15px; font-size:12px;">로그아웃</button>
      </div>
    </div>
  </nav>

  <div class="container-admin hidden" id="admin-dashboard" style="max-width:1000px;">
    <h1 style="font-size: 40px; margin-bottom:10px;">관리자 대시보드</h1>
    <div class="status-bar"><span class="dot off" id="server-dot"></span> 파이썬 로컬 서버 상태: <span id="server-text">확인중...</span></div>
    
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('price-tab', this)">단가 및 수량 수정</button>
        <button class="tab-btn" onclick="switchTab('stock-tab', this)">엑셀 업로드 자동 관리</button>
    </div>

    <!-- Tab 1: Price Edit -->
    <div id="price-tab">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>분류</th>
                    <th>기기명</th>
                    <th>현재 단가</th>
                    <th>현재 재고량</th>
                    <th>저장</th>
                </tr>
            </thead>
            <tbody id="admin-tbody"></tbody>
        </table>
    </div>

    <!-- Tab 2: Stock Excel -->
    <div id="stock-tab" class="hidden">
        <div style="background:var(--bg-secondary); padding:40px; border-radius:30px; margin-bottom:30px;">
            <h3 style="font-size:20px; font-weight:600; margin-bottom:15px;">엑셀 자동화 적용 (매일 판매/입고분)</h3>
            <p style="font-size:14px; color:var(--text-sc); margin-bottom:20px;">
              엑셀 양식은 가장 윗줄(A1~n1)에 제목이 있고, <br><b>A열: 제품ID / B열: 입고량 / C열: 판매량</b> 순으로 작성해주시면 됩니다. 
              <br>(기존 시스템에 저장된 재고에 더하고 빼서 자동으로 갱신됩니다)
            </p>
            <input type="file" id="excel-file" accept=".xlsx" class="form-control" style="margin-bottom:20px; background:var(--bg);">
            <button class="btn-primary" onclick="uploadExcel()" style="padding:10px 25px;" id="upload-btn">엑셀 데이터베이스 연동</button>
            <div id="excel-log" style="margin-top:20px; font-family:monospace; font-size:13px; color:var(--apple-blue);"></div>
        </div>
    </div>
  </div>

<script>
    let token = localStorage.getItem("hy_token");
    let baseApi = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" ? "" : "http://localhost:3000";

    async function checkServer() {
        try {
            const res = await fetch(baseApi + "/api/check-local");
            if(res.ok) {
                document.getElementById('server-dot').className = 'dot on';
                document.getElementById('server-text').innerText = '가동 중 (모든 편집/저장/엑셀 가능)';
            }
        } catch(err) {
            document.getElementById('server-dot').className = 'dot off';
            document.getElementById('server-text').innerText = '서버 꺼짐 상태 (현황 조회만 가능)';
            document.getElementById('deploy-btn').style.display = 'none';
            document.getElementById('upload-btn').style.display = 'none';
        }
    }

    function checkAuth() {
        if(token) {
            document.getElementById("login-overlay").classList.add("hidden");
            document.getElementById("admin-dashboard").classList.remove("hidden");
            checkServer();
            loadAdmin();
        } else {
            document.getElementById("login-overlay").classList.remove("hidden");
            document.getElementById("admin-dashboard").classList.add("hidden");
        }
    }

    async function doLogin() {
        const id = document.getElementById("login-id").value;
        const pw = document.getElementById("login-pw").value;
        if(pw === "ghddud1") {
            try { 
                const res = await fetch(baseApi+"/api/login", {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({id, pw})
                });
                const d = await res.json();
                if(d.success) { token = d.token; localStorage.setItem("hy_token", token); checkAuth(); }
            } catch(e) {
                token = "static-auth"; localStorage.setItem("hy_token", token); checkAuth();
            }
        } else { alert("비밀번호가 다릅니다."); }
    }

    function doLogout() { localStorage.removeItem("hy_token"); token = null; checkAuth(); }

    function switchTab(tabId, btn) {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("price-tab").classList.add("hidden");
        document.getElementById("stock-tab").classList.add("hidden");
        document.getElementById(tabId).classList.remove("hidden");
    }

    async function loadAdmin() {
        try {
            // First try API if local, else use static json
            let url = baseApi !== "" ? baseApi+"/api/products" : "/data/products.json";
            let res;
            try { res = await fetch(url); } catch(e) { res = await fetch("/data/products.json"); }
            
            const products = await res.json();
            const tbody = document.getElementById("admin-tbody");
            tbody.innerHTML = "";
            Object.keys(products).forEach(key => {
                const p = products[key];
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${p.category}</td>
                    <td style="font-weight:600;">${p.title} <br><span style="font-size:11px;color:gray;font-weight:400;">(${key})</span></td>
                    <td><input type="text" id="price-${key}" value="${p.price}" class="admin-input"></td>
                    <td><input type="number" id="stock-${key}" value="${p.stock || 0}" class="admin-input" style="width:80px;"></td>
                    <td>
                        <button class="btn-primary" onclick="updatePrice('${key}')">저장</button>
                        <span id="msg-${key}" style="font-size:12px; color:var(--apple-blue); margin-left:10px; opacity:0; transition: opacity 0.3s;">OK!</span>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch(e) { console.error(e); }
    }
    
    window.updatePrice = async (id) => {
        const newPrice = document.getElementById(`price-${id}`).value;
        const newStock = document.getElementById(`stock-${id}`).value;
        try {
            const res = await fetch(baseApi + "/api/update-price", {
                method: "POST", headers: {"Content-Type": "application/json", "Authorization": `Bearer ${token}`},
                body: JSON.stringify({id, newPrice, newStock})
            });
            if(res.ok) {
                const msg = document.getElementById(`msg-${id}`);
                msg.style.opacity = "1"; setTimeout(() => { msg.style.opacity = "0"; }, 2000);
            } else throw new Error();
        } catch(e) { alert("파이썬 로컬 서버 통신 실패.\n(Vercel 라이브 사이트에서는 수정이 불가능합니다.)"); }
    };

    async function uploadExcel() {
        const file = document.getElementById("excel-file").files[0];
        if(!file) return alert("엑셀 파일을 선택하세요.");
        const formData = new FormData();
        formData.append("excel_file", file);
        try {
            const res = await fetch(baseApi + "/api/upload-excel", {
                method: "POST", headers: {"Authorization": `Bearer ${token}`}, body: formData
            });
            const data = await res.json();
            if(res.ok && data.success) {
                document.getElementById("excel-log").innerHTML = "<b>[엑셀 연동 성공!]</b><br>" + data.logs.join("<br>");
                loadAdmin();
            } else { alert("엑셀 파싱 에러: " + data.error); }
        } catch(e) { alert("서버 연동 실패. 로컬 서버 상태를 확인하세요."); }
    }

    async function deployToVercel() {
        if(!confirm("현재 저장된 재고와 가격을 Vercel(라이브 사이트)에 전송하시겠습니까?\n(자동 PUSH. 10초 후 인터넷 사이트가 업데이트됩니다!)")) return;
        try {
            document.getElementById('deploy-btn').innerText = "배포 명령 전송 중...";
            const res = await fetch(baseApi + "/api/deploy", {
                method: "POST", headers: {"Authorization": `Bearer ${token}`}
            });
            if(res.ok) {
                alert("Vercel 배포 시그널(GitHub Push) 발송 완료! 10초 뒤 반영됩니다.");
                document.getElementById('deploy-btn').innerText = "🚀 실서버 배포 쏴주기(Vercel 연동)";
            }
            else {
                alert("서버 오류입니다.");
            }
        } catch(e) { alert("전송 실패. 서버 연결 문제."); }
    }
</script>
</body>
</html>
